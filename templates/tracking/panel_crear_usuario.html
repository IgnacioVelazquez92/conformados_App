{% extends "base.html" %}

{% block title %}Crear usuario{% endblock %}

{% block content %}
<section class="brand-card bg-white p-4">
    <h1 class="h4 page-heading">Crear usuario interno</h1>
    <p class="page-subheading">Completa datos de acceso, rol y permisos de compartido.</p>
    {% if form.errors %}
        <div class="alert alert-danger">{{ form.errors }}</div>
    {% endif %}
    <form method="post" class="row g-3">
        {% csrf_token %}
        <div class="col-12">{{ form.as_p }}</div>
        <div class="col-12 form-actions">
            <button class="btn btn-dark" type="submit">Crear usuario</button>
            <a class="btn btn-outline-secondary" href="/panel/">Volver</a>
        </div>
    </form>
</section>
{% endblock %}
